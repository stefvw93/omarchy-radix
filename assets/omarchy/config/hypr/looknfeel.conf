# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    gaps_in = 6
    gaps_out = 4, 12, 12, 12
    border_size = 1

    # Subtle, translucent active border in the theme's accent hue.
    # Override only the alpha — last two hex digits. Update if you switch themes.
    col.inactive_border = rgba(282828ff)
    col.active_border = rgba(665c54ff)

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 14
    rounding_power = 4

    # Stronger blur behind transparent (inactive) windows
    blur {
        enabled = true
        size = 10
        passes = 2
        new_optimizations = true
    }

    # macOS-style rounded screen corners (per monitor, opaque black mask).
    # Tweak the `radius` constant inside the shader to change corner size.
    # screen_shader = /home/stef/.config/hypr/shaders/rounded-corners.frag

    # macOS-style drop shadow: large, soft, slight downward offset.
    # Focused windows get a darker shadow; unfocused windows fade back.
    shadow {
        enabled = true
        range = 80
        render_power = 4
        sharp = false
        offset = 0 8
        scale = 1.0
        color = rgba(00000055)
        color_inactive = rgba(00000022)
        ignore_window = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# Inactive-window opacity (active is always 1.0)
$inactiveOpacity = 0.75

# Override omarchy's default inactive opacity (0.9)
windowrule = opacity 1.0 $inactiveOpacity, match:tag default-opacity

# Also override per-app overrides we still want dimmed when unfocused
windowrule = opacity 1.0 $inactiveOpacity, match:tag chromium-based-browser
windowrule = opacity 1.0 $inactiveOpacity, match:tag firefox-based-browser
windowrule = opacity 1.0 $inactiveOpacity, match:tag terminal


animation = workspacesIn, 1, 2, default
animation = workspacesOut, 1, 2, default
